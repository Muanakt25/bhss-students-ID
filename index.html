<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHSS Students ID Gallery & Search</title>
    <style>
        /* Color Palette (Blue Gradient Theme) */
        :root {
            --bg-color: #001D39;       
            --card-bg: #0A4174;        
            --accent-blue: #49769F;    
            --light-blue-1: #4E8EA2;   
            --light-blue-2: #6EA2B3;   
            --bright-blue: #7BBDE8;    
            --text-light: #BDD8E9;     
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(123, 189, 232, 0.2);
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 5px 0;
            color: #ffffff;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--bright-blue);
            margin-bottom: 30px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Controls (Select & Search) */
        .controls-wrapper {
            display: flex;
            gap: 20px;
            max-width: 600px;
            margin: 0 auto 30px auto;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 250px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--bright-blue);
            font-size: 1rem;
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid var(--accent-blue);
            background-color: var(--bg-color);
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--bright-blue);
            box-shadow: 0 0 12px rgba(123, 189, 232, 0.4);
        }

        /* ID Card Grid */
        .gallery-heading {
            margin-top: 20px;
            margin-bottom: 20px;
            font-size: 1.4rem;
            color: #ffffff;
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 10px;
            text-align: left;
        }

        .id-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .id-card-box {
            background: var(--bg-color);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--light-blue-1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .id-card-box:hover {
            transform: scale(1.03);
            border-color: var(--bright-blue);
            box-shadow: 0 8px 25px rgba(123, 189, 232, 0.3);
        }

        .id-card-box img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            background: rgba(255,255,255,0.05);
        }

        .roll-number-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 10px;
            background-color: var(--card-bg);
            color: var(--bright-blue);
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid var(--accent-blue);
        }

        /* POPUP MODAL (LIGHTBOX WITH NEXT/PREV) */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: rgba(0, 29, 57, 0.95); 
            backdrop-filter: blur(8px);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 85%;
            max-height: 75vh;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 2px solid var(--bright-blue);
            animation: zoomIn 0.2s;
        }

        @keyframes zoomIn {
            from { transform: scale(0.95); }
            to { transform: scale(1); }
        }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #f1f1f1;
            font-size: 45px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            z-index: 1010;
        }

        .close-btn:hover {
            color: #ff6b6b;
        }

        /* Navigation Buttons (Prev & Next) */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(10, 65, 116, 0.7);
            color: white;
            border: 2px solid var(--accent-blue);
            font-size: 30px;
            font-weight: bold;
            padding: 15px 22px;
            cursor: pointer;
            border-radius: 50%;
            user-select: none;
            transition: 0.3s;
            z-index: 1005;
        }

        .nav-btn:hover {
            background-color: var(--bright-blue);
            border-color: #ffffff;
            color: var(--bg-color);
        }

        .prev-btn { left: 30px; }
        .next-btn { right: 30px; }

        #modalCaption {
            text-align: center;
            color: white;
            padding: 20px 0;
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Mobile-ah button lian em em lo turin */
        @media (max-width: 600px) {
            .nav-btn {
                padding: 10px 16px;
                font-size: 20px;
            }
            .prev-btn { left: 10px; }
            .next-btn { right: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BHSS STUDENTS ID</h1>
        <div class="subtitle">for staff only</div>

        <div class="controls-wrapper">
            <div class="form-group">
                <label for="classSelect">Select Class</label>
                <select id="classSelect" onchange="loadClassIDs()">
                    <option value="IX_A">IX A</option>
                    <option value="IX_B">IX B</option>
                    <option value="IX_C">IX C</option>
                    <option value="X_A">X A</option>
                    <option value="X_B">X B</option>
                    <option value="XI_Arts_A">XI Arts A</option>
                    <option value="XI_Arts_B">XI Arts B</option>
                    <option value="XI_Commerce">XI Commerce</option>
                    <option value="XI_Science_A">XI Science A</option>
                    <option value="XI_Science_B">XI Science B</option>
                    <option value="XII_Arts_A">XII Arts A</option>
                    <option value="XII_Arts_B">XII Arts B</option>
                    <option value="XII_Commerce">XII Commerce</option>
                    <option value="XII_Science_A">XII Science A</option>
                    <option value="XII_Science_B">XII Science B</option>
                </select>
            </div>

            <div class="form-group">
                <label for="searchRoll">Search Roll Number</label>
                <input type="number" id="searchRoll" placeholder="Type Roll No... (e.g. 12)" oninput="filterRollNumber()">
            </div>
        </div>

        <div class="gallery-heading" id="galleryTitle">Student IDs</div>
        
        <div class="id-grid" id="idGridContainer">
            </div>
    </div>

    <div id="idModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        
        <button class="nav-btn prev-btn" onclick="changeImage(-1, event)">prev</button>
        <button class="nav-btn next-btn" onclick="changeImage(1, event)">next</button>
        
        <div class="modal-container" onclick="closeModal()">
            <img class="modal-content" id="imgModalTarget" onclick="event.stopPropagation()">
            <div id="modalCaption"></div>
        </div>
    </div>

    <script>
        const classStudentCount = {
            'IX_A': 60, 'IX_B': 60, 'IX_C': 61, 'X_A': 74, 'X_B': 72,
            'XI_Arts_A': 50, 'XI_Arts_B': 50, 'XI_Commerce': 30, 'XI_Science_A': 25, 'XI_Science_B': 25,
            'XII_Arts_A': 45, 'XII_Arts_B': 45, 'XII_Commerce': 25, 'XII_Science_A': 20, 'XII_Science_B': 20
        };

        // Tun thlaa thlalak en lai (Current Index) hriat reatna tur variable te
        let currentRollArray = []; 
        let currentActiveIndex = -1;
        let currentClassText = "";
        let currentClassFolder = "";

        function loadClassIDs() {
            const classSelect = document.getElementById('classSelect').value;
            currentClassFolder = classSelect;
            currentClassText = document.getElementById('classSelect').options[document.getElementById('classSelect').selectedIndex].text;
            const gridContainer = document.getElementById('idGridContainer');
            const galleryTitle = document.getElementById('galleryTitle');
            const searchInput = document.getElementById('searchRoll');

            searchInput.value = '';
            galleryTitle.innerText = `${currentClassText} Student IDs`;
            gridContainer.innerHTML = '';
            currentRollArray = []; // Array thianfai phawt tur

            const totalStudents = classStudentCount[classSelect] || 0;

            for (let i = 1; i <= totalStudents; i++) {
                const imagePath = `${classSelect}/roll_${i}.jpg`;
                currentRollArray.push(i); // Roll number tlar khawmna

                const cardHtml = `
                    <div class="id-card-box" data-roll="${i}" onclick="openModal(${i})">
                        <img src="${imagePath}" alt="Roll ${i}" onerror="this.parentElement.style.direction='none'; this.parentElement.remove(); removeRollFromList(${i});">
                        <span class="roll-number-badge">Roll No: ${i}</span>
                    </div>
                `;
                gridContainer.innerHTML += cardHtml;
            }
        }

        // Folder a awm lo hrim hrim thupna leh List atanga paih rualna
        function removeRollFromList(roll) {
            currentRollArray = currentRollArray.filter(r => r !== roll);
        }

        function filterRollNumber() {
            const searchValue = document.getElementById('searchRoll').value.trim();
            const cards = document.querySelectorAll('.id-card-box');
            
            // Filter hnu a Roll hmuh tur la awm te chauh kha array tharah kan dah leh thin ang nav-btn hman tlak nan
            currentRollArray = [];

            cards.forEach(card => {
                const cardRoll = parseInt(card.getAttribute('data-roll'));
                
                if (searchValue === "") {
                    card.style.display = 'block';
                    currentRollArray.push(cardRoll);
                } else if (cardRoll.toString() === searchValue) {
                    card.style.display = 'block'; 
                    currentRollArray.push(cardRoll);
                } else {
                    card.style.display = 'none';  
                }
            });
        }

        // Lightbox Popup Hawnna
        function openModal(rollNumber) {
            const modal = document.getElementById('idModal');
            currentActiveIndex = currentRollArray.indexOf(rollNumber);
            
            if (currentActiveIndex === -1) return; 

            modal.style.display = "block";
            updateModalContent();
        }

        // Popup chhung thlalak leh caption thlakna bik
        function updateModalContent() {
            const modalImg = document.getElementById('imgModalTarget');
            const caption = document.getElementById('modalCaption');
            
            const activeRoll = currentRollArray[currentActiveIndex];
            const imagePath = `${currentClassFolder}/roll_${activeRoll}.jpg`;

            modalImg.src = imagePath;
            caption.innerText = `Roll Number: ${activeRoll} (${currentClassText})`;
        }

        // Next (+1) emaw Previous (-1) hmeha thlakna tur
        function changeImage(direction, event) {
            if (event) event.stopPropagation(); // Hmeh ruala popup lo inkhang ve ringawt tur venna
            
            if (currentRollArray.length <= 1) return;

            currentActiveIndex += direction;

            // A tawp ber dawtah a hmasa berah bawk va phei leh rawh se (Looping)
            if (currentActiveIndex >= currentRollArray.length) {
                currentActiveIndex = 0;
            } else if (currentActiveIndex < 0) {
                currentActiveIndex = currentRollArray.length - 1;
            }

            updateModalContent();
        }

        function closeModal() {
            document.getElementById('idModal').style.display = "none";
        }

        // Keyboard Arrow Keys (Left & Right) hmeha thlak kual theihna
        document.addEventListener('keydown', function(event) {
            const modal = document.getElementById('idModal');
            if (modal.style.display === "block") {
                if (event.key === "ArrowRight") {
                    changeImage(1);
                } else if (event.key === "ArrowLeft") {
                    changeImage(-1);
                } else if (event.key === "Escape") {
                    closeModal();
                }
            }
        });

        window.onload = function() {
            loadClassIDs();
        };
    </script>

</body>
</html>

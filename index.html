<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHSS Students ID Gallery & Search</title>
    <style>
        /* Color Palette (Blue Gradient Theme) */
        :root {
            --bg-color: #001D39;       /* Deep Navy Blue */
            --card-bg: #0A4174;        /* Dark Blue */
            --accent-blue: #49769F;    /* Medium Blue */
            --light-blue-1: #4E8EA2;   /* Teal Blue */
            --light-blue-2: #6EA2B3;   /* Soft Blue */
            --bright-blue: #7BBDE8;    /* Bright Sky Blue */
            --text-light: #BDD8E9;     /* Very Light Blue */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(123, 189, 232, 0.2);
            box-sizing: border-box;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 5px 0;
            color: #ffffff;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1rem;
            color: var(--bright-blue);
            margin-bottom: 30px;
            font-weight: 500;
            text-transform: uppercase; /* 'for staff only' kha capital letter deuhva ti lang tu tur */
            letter-spacing: 2px;
        }

        /* Controls (Select & Search Side-by-Side) */
        .controls-wrapper {
            display: flex;
            gap: 20px;
            max-width: 600px;
            margin: 0 auto 30px auto;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 250px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--bright-blue);
            font-size: 1rem;
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid var(--accent-blue);
            background-color: var(--bg-color);
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--bright-blue);
            box-shadow: 0 0 12px rgba(123, 189, 232, 0.4);
        }

        /* ID Card Grid */
        .gallery-heading {
            margin-top: 20px;
            margin-bottom: 20px;
            font-size: 1.4rem;
            color: #ffffff;
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 10px;
            text-align: left;
        }

        .id-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .id-card-box {
            background: var(--bg-color);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--light-blue-1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .id-card-box:hover {
            transform: scale(1.03);
            border-color: var(--bright-blue);
            box-shadow: 0 8px 25px rgba(123, 189, 232, 0.3);
        }

        .id-card-box img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            background: rgba(255,255,255,0.05);
        }

        .roll-number-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 10px;
            background-color: var(--card-bg);
            color: var(--bright-blue);
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid var(--accent-blue);
        }

        /* POPUP MODAL (A mala lanna tur) */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            padding-top: 60px; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgba(0, 29, 57, 0.9); 
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 80vh;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 2px solid var(--bright-blue);
            animation: zoomIn 0.3s;
        }

        @keyframes zoomIn {
            from { transform: scale(0.9); }
            to { transform: scale(1); }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
        }

        .close-btn:hover {
            color: var(--bright-blue);
        }

        #modalCaption {
            margin: auto;
            display: block;
            width: 80%;
            max-width: 700px;
            text-align: center;
            color: white;
            padding: 15px 0;
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BHSS STUDENTS ID</h1>
        <div class="subtitle">for staff only</div>

        <div class="controls-wrapper">
            <div class="form-group">
                <label for="classSelect">Select Class</label>
                <select id="classSelect" onchange="loadClassIDs()">
                    <option value="IX_A">IX A</option>
                    <option value="IX_B">IX B</option>
                    <option value="IX_C">IX C</option>
                    <option value="X_A">X A</option>
                    <option value="X_B">X B</option>
                    <option value="XI_Arts_A">XI Arts A</option>
                    <option value="XI_Arts_B">XI Arts B</option>
                    <option value="XI_Commerce">XI Commerce</option>
                    <option value="XI_Science_A">XI Science A</option>
                    <option value="XI_Science_B">XI Science B</option>
                    <option value="XII_Arts_A">XII Arts A</option>
                    <option value="XII_Arts_B">XII Arts B</option>
                    <option value="XII_Commerce">XII Commerce</option>
                    <option value="XII_Science_A">XII Science A</option>
                    <option value="XII_Science_B">XII Science B</option>
                </select>
            </div>

            <div class="form-group">
                <label for="searchRoll">Search Roll Number</label>
                <input type="number" id="searchRoll" placeholder="Type Roll No... (e.g. 12)" oninput="filterRollNumber()">
            </div>
        </div>

        <div class="gallery-heading" id="galleryTitle">Student IDs</div>
        
        <div class="id-grid" id="idGridContainer">
            </div>
    </div>

    <div id="idModal" class="modal" onclick="closeModal()">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="imgModalTarget">
        <div id="modalCaption"></div>
    </div>

    <script>
        // Class tina student roll number zat (Max Roll Number)
        const classStudentCount = {
            'IX_A': 60,
            'IX_B': 60,
            'IX_C': 61,
            'X_A': 74,
            'X_B': 72,
            'XI_Arts_A': 50,
            'XI_Arts_B': 50,
            'XI_Commerce': 30,
            'XI_Science_A': 25,
            'XI_Science_B': 25,
            'XII_Arts_A': 83,
            'XII_Arts_B': 78,
            'XII_Commerce': 45,
            'XII_Science_A': 55,
            'XII_Science_B': 51
        };

        // Grid chhunga ID zawng zawng load-na
        function loadClassIDs() {
            const classSelect = document.getElementById('classSelect').value;
            const classText = document.getElementById('classSelect').options[document.getElementById('classSelect').selectedIndex].text;
            const gridContainer = document.getElementById('idGridContainer');
            const galleryTitle = document.getElementById('galleryTitle');
            const searchInput = document.getElementById('searchRoll');

            // Search box thianfai phawt tur class thlak hian
            searchInput.value = '';
            galleryTitle.innerText = `${classText} Student IDs`;
            gridContainer.innerHTML = '';

            const totalStudents = classStudentCount[classSelect] || 0;

            for (let i = 1; i <= totalStudents; i++) {
                const imagePath = `${classSelect}/roll_${i}.jpg`;

                // Card HTML siam chawpna
                const cardHtml = `
                    <div class="id-card-box" data-roll="${i}" onclick="openModal('${imagePath}', 'Roll Number: ${i} (${classText})')">
                        <img src="${imagePath}" alt="Roll ${i}" onerror="this.parentElement.style.display='none';">
                        <span class="roll-number-badge">Roll No: ${i}</span>
                    </div>
                `;
                gridContainer.innerHTML += cardHtml;
            }
        }

        // Roll Number zawnna (Live Filter)
        function filterRollNumber() {
            const searchValue = document.getElementById('searchRoll').value.trim();
            const cards = document.querySelectorAll('.id-card-box');

            cards.forEach(card => {
                const cardRoll = card.getAttribute('data-roll');
                
                if (searchValue === "") {
                    card.style.display = 'block';
                } else if (cardRoll === searchValue) {
                    card.style.display = 'block'; 
                } else {
                    card.style.display = 'none';  
                }
            });
        }

        // Popup Modal Hawnna
        function openModal(imgSrc, captionText) {
            const modal = document.getElementById('idModal');
            const modalImg = document.getElementById('imgModalTarget');
            const caption = document.getElementById('modalCaption');
            
            modal.style.display = "block";
            modalImg.src = imgSrc;
            caption.innerText = captionText;
        }

        // Popup Modal Kharna
        function closeModal() {
            document.getElementById('idModal').style.display = "none";
        }

        // Page inload ruala ti nung nghal tur
        window.onload = function() {
            loadClassIDs();
        };
    </script>

</body>
</html>

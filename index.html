<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHSS Students ID Gallery & Search</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
    
    <!-- Real Authentication: Load Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
        /* ============ Token System ============ */
        :root {
            --navy-950: #061423;
            --navy-900: #0C2339;
            --navy-850: #102A44;
            --navy-800: #16334F;
            --brass: #C6A15B;
            --brass-light: #E7CE94;
            --ink-blue: #4C7FA6;
            --text-primary: #EAF1F8;
            --text-muted: #93A9BE;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(ellipse 900px 500px at 15% -10%, rgba(76,127,166,0.18), transparent 60%),
                radial-gradient(ellipse 800px 600px at 100% 10%, rgba(198,161,91,0.08), transparent 55%),
                var(--navy-950);
            color: var(--text-primary);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ============ Main Container ============ */
        .container {
            width: 100%;
            max-width: 960px;
            background: linear-gradient(180deg, var(--navy-900), #0A1D30);
            padding: 42px 38px 38px;
            border-radius: 18px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
            text-align: center;
            border: 1px solid var(--navy-800);
            position: relative;
            display: none; 
        }

        .container.visible {
            display: block;
            animation: riseIn 0.5s ease;
        }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 6px;
        }

        .crest-logo {
            width: 55px;
            height: 55px;
            object-fit: contain;
            flex-shrink: 0;
        }

        h1 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 2.4rem;
            margin: 0;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 34px;
            margin-top: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .subtitle::before, .subtitle::after {
            content: "—";
            color: var(--navy-800);
            margin: 0 12px;
        }

        /* ============ Controls ============ */
        .controls-wrapper {
            display: flex;
            gap: 20px;
            max-width: 620px;
            margin: 0 auto 36px auto;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 250px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        select, input {
            width: 100%;
            padding: 13px 15px;
            border-radius: 10px;
            border: 1.5px solid var(--navy-800);
            background-color: var(--navy-850);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.25s;
        }

        select:focus, input:focus {
            border-color: var(--brass);
            box-shadow: 0 0 0 4px rgba(198,161,91,0.15);
        }

        /* ============ Gallery & Cards ============ */
        .gallery-heading {
            margin-top: 10px;
            margin-bottom: 22px;
            font-family: 'Fraunces', serif;
            font-size: 1.3rem;
            font-weight: 500;
            color: #ffffff;
            border-bottom: 1px solid var(--navy-800);
            padding-bottom: 14px;
            text-align: left;
        }

        .id-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 18px;
            margin-top: 20px;
        }

        .id-card-box {
            background: var(--navy-850);
            padding: 12px 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--navy-800);
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .id-card-box::before {
            content: "";
            position: absolute;
            top: 0;
            right: 18px;
            width: 26px;
            height: 10px;
            background: var(--brass);
            clip-path: polygon(15% 0, 85% 0, 100% 100%, 0% 100%);
            opacity: 0.85;
        }

        .id-card-box:hover {
            transform: translateY(-4px);
            border-color: var(--brass);
            box-shadow: 0 14px 30px rgba(198,161,91,0.18);
        }

        .id-card-box img {
            width: 100%;
            height: auto;
            border-radius: 6px;
            display: block;
            background: rgba(255,255,255,0.04);
        }

        .roll-number-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 4px 11px;
            background-color: transparent;
            color: var(--brass-light);
            border-radius: 20px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid var(--navy-800);
        }

        /* ============ Sign-in Gate ============ */
        .signin-gate {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: riseIn 0.5s ease;
        }

        .signin-gate.hidden { display: none; }

        .badge {
            width: 100%;
            background: linear-gradient(180deg, var(--navy-900), #0A1D30);
            border-radius: 20px;
            border: 1px solid var(--navy-800);
            box-shadow: 0 30px 70px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.04);
            padding: 40px 30px 32px;
            position: relative;
            text-align: center;
        }

        .badge::before {
            content: "";
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 28px;
            height: 28px;
            background: var(--navy-950);
            border: 1px solid var(--navy-800);
            border-radius: 50%;
        }

        .badge-crest-logo {
            width: 85px;
            height: 85px;
            object-fit: contain;
            margin: 0 auto 16px;
            display: block;
        }

        .badge h2 {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 1.5rem;
            margin: 0 0 6px;
            color: #ffffff;
        }

        .badge p.lede {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin: 0 0 24px;
            line-height: 1.5;
        }

        .google-btn-wrapper {
            background: #ffffff;
            border-radius: 14px;
            padding: 24px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 12px;
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.82rem;
            margin-top: 8px;
            font-weight: 500;
            display: none;
        }

        .badge-footnote {
            margin-top: 22px;
            font-size: 0.7rem;
            color: #5C7185;
            letter-spacing: 0.5px;
        }

        /* ============ POPUP MODAL (LIGHTBOX) ============ */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: rgba(6, 20, 35, 0.95);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 85%;
            max-height: 75vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            border: 1px solid var(--brass);
            animation: zoomIn 0.2s;
        }

        @keyframes zoomIn { from { transform: scale(0.95); } to { transform: scale(1); } }

        .close-btn {
            position: absolute;
            top: 25px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: 300;
            transition: 0.3s;
            cursor: pointer;
            z-index: 1010;
        }

        .close-btn:hover { color: var(--brass-light); }

        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(16, 42, 68, 0.7);
            color: white;
            border: 1.5px solid var(--navy-800);
            font-size: 26px;
            font-weight: 400;
            padding: 15px 22px;
            cursor: pointer;
            border-radius: 50%;
            user-select: none;
            transition: 0.3s;
            z-index: 1005;
        }

        .nav-btn:hover {
            background-color: var(--brass);
            border-color: var(--brass);
            color: var(--navy-950);
        }

        .prev-btn { left: 30px; }
        .next-btn { right: 30px; }

        #modalCaption {
            text-align: center;
            color: white;
            padding: 20px 0;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        @media (max-width: 600px) {
            .container { padding: 30px 20px; }
            h1 { font-size: 1.9rem; }
            .nav-btn { padding: 10px 16px; font-size: 20px; }
            .prev-btn { left: 10px; }
            .next-btn { right: 10px; }
            .badge { padding: 34px 20px 26px; }
        }
    </style>
</head>
<body>

    <!-- ============ Sign-in Gate ============ -->
    <div class="signin-gate" id="signinGate">
        <div class="badge">
            <!-- Render School Logo Identity Document Image -->
            <img src="BHSS bLUE.png" alt="BHSS Logo" class="badge-crest-logo">
            <h2>BHSS Students ID</h2>
            <h2>Staff Access</h2>
            <p class="lede">Sign in with your school Google account to open the students ID.</p>

            <div class="google-btn-wrapper">
                <!-- Native Core Script Authentication Hook Anchor Context -->
                <div id="g_id_onload"
                     data-client_id="861013290714-gnktj2v5ca3mq0iamhat8qv3dbc8bveg.apps.googleusercontent.com"
                     data-context="signin"
                     data-callback="handleCredentialResponse"
                     data-auto_select="false"
                     data-close_on_tap_outside="false">
                </div>

                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left">
                </div>
                
                <div class="error-message" id="authError">Access restricted to @baptisthss.in identities.</div>
            </div>

            <div class="badge-footnote">BHSS · Internal Staff Use Only</div>
        </div>
    </div>

    <!-- ============ Main Gallery ============ -->
    <div class="container" id="mainContainer">
        <div class="brand-row">
            <!-- School Logo Component Persistent Presence inside Main Workspace -->
            <img src="BHSS bLUE.jpg" alt="BHSS Logo" class="crest-logo">
            <h1 id="userGreeting">BHSS Students ID</h1>
        </div>
        <div class="subtitle">Staff Registry Access</div>

        <div class="controls-wrapper">
            <div class="form-group">
                <label for="classSelect">Select Class</label>
                <select id="classSelect" onchange="loadClassIDs()">
                    <option value="IX_A">IX A</option>
                    <option value="IX_B">IX B</option>
                    <option value="IX_C">IX C</option>
                    <option value="X_A">X A</option>
                    <option value="X_B">X B</option>
                    <option value="XI_Arts_A">XI Arts A</option>
                    <option value="XI_Arts_B">XI Arts B</option>
                    <option value="XI_Commerce">XI Commerce</option>
                    <option value="XI_Science_A">XI Science A</option>
                    <option value="XI_Science_B">XI Science B</option>
                    <option value="XII_Arts_A">XII Arts A</option>
                    <option value="XII_Arts_B">XII Arts B</option>
                    <option value="XII_Commerce">XII Commerce</option>
                    <option value="XII_Science_A">XII Science A</option>
                    <option value="XII_Science_B">XII Science B</option>
                </select>
            </div>

            <div class="form-group">
                <label for="searchRoll">Search Roll Number</label>
                <input type="number" id="searchRoll" placeholder="Type Roll No... (e.g. 12)" oninput="filterRollNumber()">
            </div>
        </div>

        <div class="gallery-heading" id="galleryTitle">Student IDs</div>
        <div class="id-grid" id="idGridContainer"></div>
    </div>

    <!-- ============ Lightbox Modal ============ -->
    <div id="idModal" class="modal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <button class="nav-btn prev-btn" onclick="changeImage(-1, event)">&#8249;</button>
        <button class="nav-btn next-btn" onclick="changeImage(1, event)">&#8250;</button>
        <div class="modal-container" onclick="closeModal()">
            <img class="modal-content" id="imgModalTarget" onclick="event.stopPropagation()">
            <div id="modalCaption"></div>
        </div>
    </div>

    <script>
        const classStudentCount = {
            'IX_A': 60, 'IX_B': 60, 'IX_C': 61, 'X_A': 74, 'X_B': 72,
            'XI_Arts_A': 50, 'XI_Arts_B': 50, 'XI_Commerce': 30, 'XI_Science_A': 25, 'XI_Science_B': 25,
            'XII_Arts_A': 45, 'XII_Arts_B': 45, 'XII_Commerce': 25, 'XII_Science_A': 20, 'XII_Science_B': 20
        };

        let currentRollArray = []; 
        let currentActiveIndex = -1;
        let currentClassText = "";
        let currentClassFolder = "";

        // Core Base64 JWT Parser
        function decodeJwt(token) {
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                return JSON.parse(jsonPayload);
            } catch (error) {
                return null;
            }
        }

        // Handle incoming secure response payload
        function handleCredentialResponse(response) {
            const payload = decodeJwt(response.credential);
            
            if (!payload) {
                showAuthError("Authentication structural failure. Try again.");
                return;
            }

            // Domain Identity Gatekeeping Logic
            const targetDomain = "baptisthss.in";
            if (payload.hd !== targetDomain && !payload.email.endsWith("@" + targetDomain)) {
                showAuthError(`Access Denied: Must use a @${targetDomain} account.`);
                return;
            }

            sessionStorage.setItem('bhss_authenticated', 'true');
            sessionStorage.setItem('bhss_user_name', payload.given_name || payload.name);

            transitionToGallery(payload.given_name || payload.name);
        }

        function showAuthError(msg) {
            const errEl = document.getElementById('authError');
            errEl.innerText = msg;
            errEl.style.display = "block";
        }

        function transitionToGallery(name) {
            document.getElementById('signinGate').classList.add('hidden');
            document.getElementById('mainContainer').classList.add('visible');
            
            if(name) {
                document.getElementById('userGreeting').innerText = `BHSS Student IDs (Staff: ${name})`;
            }

            loadClassIDs();
        }

        function loadClassIDs() {
            const classSelect = document.getElementById('classSelect').value;
            currentClassFolder = classSelect;
            currentClassText = document.getElementById('classSelect').options[document.getElementById('classSelect').selectedIndex].text;
            const gridContainer = document.getElementById('idGridContainer');
            const galleryTitle = document.getElementById('galleryTitle');
            const searchInput = document.getElementById('searchRoll');

            searchInput.value = '';
            galleryTitle.innerText = `${currentClassText} Student IDs`;
            gridContainer.innerHTML = '';
            currentRollArray = [];

            const totalStudents = classStudentCount[classSelect] || 0;

            for (let i = 1; i <= totalStudents; i++) {
                const imagePath = `${classSelect}/roll_${i}.jpg`;
                currentRollArray.push(i);

                const cardHtml = `
                    <div class="id-card-box" data-roll="${i}" onclick="openModal(${i})">
                        <img src="${imagePath}" alt="Roll ${i}" onerror="this.parentElement.remove(); removeRollFromList(${i});">
                        <span class="roll-number-badge">Roll No: ${i}</span>
                    </div>
                `;
                gridContainer.innerHTML += cardHtml;
            }
        }

        function removeRollFromList(roll) {
            currentRollArray = currentRollArray.filter(r => r !== roll);
        }

        function filterRollNumber() {
            const searchValue = document.getElementById('searchRoll').value.trim();
            const cards = document.querySelectorAll('.id-card-box');
            currentRollArray = [];

            cards.forEach(card => {
                const cardRoll = parseInt(card.getAttribute('data-roll'));
                if (searchValue === "") {
                    card.style.display = 'block';
                    currentRollArray.push(cardRoll);
                } else if (cardRoll.toString() === searchValue) {
                    card.style.display = 'block'; 
                    currentRollArray.push(cardRoll);
                } else {
                    card.style.display = 'none';  
                }
            });
        }

        function openModal(rollNumber) {
            const modal = document.getElementById('idModal');
            currentActiveIndex = currentRollArray.indexOf(rollNumber);
            if (currentActiveIndex === -1) return; 
            modal.style.display = "block";
            updateModalContent();
        }

        function updateModalContent() {
            const modalImg = document.getElementById('imgModalTarget');
            const caption = document.getElementById('modalCaption');
            const activeRoll = currentRollArray[currentActiveIndex];
            const imagePath = `${currentClassFolder}/roll_${activeRoll}.jpg`;

            modalImg.src = imagePath;
            caption.innerText = `Roll Number: ${activeRoll} (${currentClassText})`;
        }

        function changeImage(direction, event) {
            if (event) event.stopPropagation();
            if (currentRollArray.length <= 1) return;

            currentActiveIndex += direction;
            if (currentActiveIndex >= currentRollArray.length) {
                currentActiveIndex = 0;
            } else if (currentActiveIndex < 0) {
                currentActiveIndex = currentRollArray.length - 1;
            }
            updateModalContent();
        }

        // Lightbox Close Lifecycle Hook
        function closeModal() {
            document.getElementById('idModal').style.display = "none";
        }

        document.addEventListener('keydown', function(event) {
            const modal = document.getElementById('idModal');
            if (modal.style.display === "block") {
                if (event.key === "ArrowRight") changeImage(1);
                else if (event.key === "ArrowLeft") changeImage(-1);
                else if (event.key === "Escape") closeModal();
            }
        });

        window.onload = function() {
            const isAuthenticated = sessionStorage.getItem('bhss_authenticated');
            if (isAuthenticated === 'true') {
                const savedName = sessionStorage.getItem('bhss_user_name');
                transitionToGallery(savedName);
            }
        };
    </script>
</body>
</html>
